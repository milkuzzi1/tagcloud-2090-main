services:
  postgres:
    image: postgres:16-alpine
    container_name: tagcloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tagcloud}
      # No insecure default: compose fails fast if POSTGRES_PASSWORD is unset,
      # so a forgotten secret can never ship a weak password to production.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-tagcloud}
    # Loopback only. The app reaches Postgres over the compose network (host
    # "postgres"), so there is no reason to publish 5432 on the public
    # interface. Set POSTGRES_BIND=0.0.0.0 only if you need remote admin.
    ports:
      - '${POSTGRES_BIND:-127.0.0.1}:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tagcloud}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tagcloud-redis
    restart: unless-stopped
    # Require a password; fail fast if REDIS_PASSWORD is unset.
    command:
      ['redis-server', '--requirepass', '${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}']
    # Loopback only — same rationale as Postgres.
    ports:
      - '${REDIS_BIND:-127.0.0.1}:6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

volumes:
  pgdata:
  redisdata:
